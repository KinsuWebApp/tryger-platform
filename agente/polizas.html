<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mis pólizas · Tryger</title>

<link rel="stylesheet" href="../shared/design-system.css" />
<link rel="stylesheet" href="../shared/components.css" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

<style>
.placeholder-card { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 40px; text-align: center; background: white; border: 1px dashed var(--border-mid); border-radius: var(--radius-xl); }
.placeholder-icon { width: 64px; height: 64px; border-radius: 50%; background: var(--bg-app); display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
.placeholder-icon .material-symbols-outlined { font-size: 32px; color: var(--tryger-blue); }
.placeholder-title { font-size: 20px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
.placeholder-sub { font-size: 14px; color: var(--text-muted); max-width: 480px; line-height: 1.6; margin-bottom: 20px; }
.placeholder-tag { display: inline-block; padding: 4px 10px; background: rgba(245,158,11,.14); color: #b07208; border-radius: 99px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; }
</style>
</head>

<body data-layout="agente"
      data-active="polizas"
      data-crumb-section="Mi operación"
      data-crumb-page="Mis pólizas">

<div class="app">
  <div data-slot="sidebar"></div>
  <main class="main">
    <div data-slot="topbar"></div>
    <div class="content">

      <div class="page-header">
        <div>
          <h1 class="page-title">Mis pólizas</h1>
        </div>
      </div>

      <div class="placeholder-card">
        <div class="placeholder-icon">
          <span class="material-symbols-outlined">shield</span>
        </div>
        <div class="placeholder-title">Esta pantalla viene en la Fase 3</div>
        <p class="placeholder-sub">Histórico completo de tus pólizas con su estatus actual, número, monto y fechas clave.</p>
        <span class="placeholder-tag">Pendiente · Fase 3</span>
      </div>

    </div>
  </main>
</div>

<script src="../data/dummy.js"></script>
<script src="../shared/utils.js"></script>
<script src="../shared/auth.js"></script>
<script src="../shared/api.js"></script>
<script src="../shared/layout-loader.js"></script>
</body>
</html>
