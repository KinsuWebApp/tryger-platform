<!-- ═══════════════════════════════════════════════════════════════
     TOPBAR — parcial reutilizable
     Inyectado por shared/layout-loader.js
     El breadcrumb y el título se configuran con atributos en el <body>:
     <body data-crumb-section="Mi operación" data-crumb-page="Dashboard">
     ═══════════════════════════════════════════════════════════════ -->
<div class="topbar">

  <!-- Breadcrumb -->
  <div class="breadcrumb">
    <span data-crumb-section>Mi operación</span>
    <span class="material-symbols-outlined">chevron_right</span>
    <span class="crumb-active" data-crumb-page>Dashboard</span>
  </div>

  <div class="topbar-spacer"></div>

  <!-- Searchbox -->
  <div class="searchbox">
    <span class="material-symbols-outlined">search</span>
    <input placeholder="Buscar prospecto, cotización..." />
    <span class="kbd">⌘K</span>
  </div>

  <!-- Iconos -->
  <button class="icon-btn" aria-label="Ayuda">
    <span class="material-symbols-outlined">help</span>
  </button>

  <button class="icon-btn" aria-label="Notificaciones">
    <span class="material-symbols-outlined">notifications</span>
    <span class="dot-badge"></span>
  </button>

  <div class="topbar-divider"></div>

  <!-- Avatar -->
  <div class="topbar-avatar" data-user-initials title="Mi cuenta">JP</div>
</div>
